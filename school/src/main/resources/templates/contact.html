
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy School - Best Education for Your Kids</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS (Linked for Spring Boot structure) -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">

    <style>
        .social-icon {
            @apply w-8 h-8 flex items-center justify-center rounded text-white text-sm transition-opacity hover:opacity-80;
        }
    </style>
</head>
<body class="bg-white text-gray-800 transition-colors duration-300">

    <!-- ========================================== -->
    <!-- HEADER SECTION -->
    <!-- ========================================== -->
          <div th:replace="~{header :: header}"></div>    
    <main>  
        <!-- INNER BANNER SECTION -->
        <section class="relative bg-cover bg-center h-[300px] flex items-center"
                th:style="'background-image: url(' + @{/images/img-11.png} + ');'">

            <!-- White Overlay -->
            <div class="absolute inset-0 bg-white/80"></div>

            <!-- Content -->
            <div class="relative z-10 px-10 md:px-20">
                <h1 class="text-5xl font-bold text-black mb-4">Contact Us</h1>

                <div class="flex items-center space-x-3 text-lg font-medium">
                    <a th:href="@{/home}" class="text-black hover:text-gray-700">Home</a>
                    <span class="text-gray-500">›</span>
                    <a th:href="@{/contact}" class="text-gray-500">Contact Us</a>
                </div>
            </div>
        </section>

        <section class="py-20 bg-white">
            <div class="container mx-auto px-6 lg:px-20">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                    
                    <!-- LEFT: CONTACT FORM (Occupies 2 columns) -->
                    <div class="lg:col-span-2"> 	
                    <ul>
   	 			<li class="alert alert-danger" role="alert"
        			th:each="error : ${#fields.errors('*')}"
        			th:text="${error}">
    			</li>
				</ul>
                        <form :action="/saveMsg" method="post" class="space-y-6" th:object="${contact}">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input type="text" th:field="*{name}" placeholder="Your Name" required="true" 
                                    class="w-full bg-gray-100 border-none rounded-lg p-4 focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
                                <input type="text" th:field="*{mobileNum}" placeholder="Your Mobile Number" required="true"
                                    class="w-full bg-gray-100 border-none rounded-lg p-4 focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
                            </div>
                            <input type="email" th:field="*{email}" placeholder="Your Email" required="true"
                                class="w-full bg-gray-100 border-none rounded-lg p-4 focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
                            <input type="text" th:field="*{subject}" placeholder="Subject" required="true"
                                class="w-full bg-gray-100 border-none rounded-lg p-4 focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
                            <textarea th:field="*{message}" placeholder="Type your message here" rows="5"  required="true"
                                class="w-full bg-gray-100 border-none rounded-lg p-4 focus:ring-2 focus:ring-blue-400 outline-none resize-none text-gray-600"></textarea>
                            
                            <div class="pt-2">
                                <button type="submit" class="bg-[#00a2ff] text-white px-12 py-4 rounded-full font-bold text-lg hover:bg-blue-600 transition duration-300 shadow-md">
                                    Send Message
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- RIGHT: COMPACT CONTACT INFO CARD -->
                    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 space-y-8 h-full">
                        
                        <!-- Address -->
                        <div class="flex items-start space-x-4">
                            <div class="text-[#00a2ff] text-2xl mt-1 w-8">
                                <i class="fas fa-city"></i>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-gray-900">School Address</h4>
                                <p class="text-gray-500 text-sm mt-1 leading-relaxed">
                                    Eazy School, 10001, 5th Avenue, #06 lane street, pune - 10017.
                                </p>
                            </div>
                        </div>

                        <!-- Call Us -->
                        <div class="flex items-start space-x-4">
                            <div class="text-[#00a2ff] text-2xl mt-1 w-8">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-gray-900">Call Us</h4>
                                <p class="text-gray-500 text-sm mt-1">+919876543210</p>
                            </div>
                        </div>

                        <!-- Email Us -->
                        <div class="flex items-start space-x-4">
                            <div class="text-[#00a2ff] text-2xl mt-1 w-8">
                                <i class="fas fa-envelope-open-text"></i>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-gray-900">Email Us</h4>
                                <p class="text-gray-500 text-sm mt-1">sumit@eazyschool.com</p>
                            </div>
                        </div>

                        <!-- Customer Support -->
                        <div class="flex items-start space-x-4">
                            <div class="text-[#00a2ff] text-2xl mt-1 w-8">
                                <i class="fas fa-headset"></i>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-gray-900">Customer Support</h4>
                                <p class="text-gray-500 text-sm mt-1">sumitnahire@eazyschool.com</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- GOOGLE MAP SECTION (NEWLY ADDED) -->
        <!-- ========================================== -->
                <!-- GOOGLE MAP SECTION -->
        <section class="w-full h-[450px] mt-10">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.264426500595!2d73.8475878!3d18.5169123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2bf8a08d00001%3A0x94848d533f81e672!2sSir%20Parashurambhau%20College!5e0!3m2!1sen!2sin!4v1709636254000!5m2!1sen!2sin" 
                class="w-full h-full border-0" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </main>

    <!-- ========================================== -->
    <!-- FOOTER SECTION -->
    <!-- ========================================== -->
    <div th:replace="~{footer :: footer}"></div>

    <!-- Combined JS Logic -->
    <script th:src="@{/js/main.js}" src="../static/js/main.js"></script>
</body>
</html>```
