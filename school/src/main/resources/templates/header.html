<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>

<body>

<header th:fragment="header">
    <nav class="flex items-center justify-between px-10 py-5 sticky top-0 bg-white z-50 shadow-sm transition-colors duration-300"
         id="navbar">

        <div class="flex items-center gap-2">
            <span class="text-3xl text-orange-400">
                <i class="fas fa-graduation-cap"></i>
            </span>
            <h1 class="text-3xl font-extrabold tracking-tight">
                Eazy <span class="text-gray-900" id="logo-school">School</span>
            </h1>
        </div>

        <ul class="hidden md:flex items-center gap-8 font-semibold">
            <li sec:authorize="isAnonymous()">
                <a th:href="@{/}"
                   th:classappend="${currentUri == '/'} ? ' text-orange-400' : ''">
                    Home
                </a>
            </li>

            <li sec:authorize="isAnonymous()">
                <a th:href="@{/courses}"
                   th:classappend="${currentUri == '/courses'} ? ' text-orange-400' : ''">
                    Courses
                </a>
            </li>

            <li sec:authorize="isAnonymous()">
                <a th:href="@{/contact}"
                   th:classappend="${currentUri == '/contact'} ? ' text-orange-400' : ''">
                    Contact
                </a>
            </li>

            <li sec:authorize="isAnonymous()">
                <a th:href="@{/login}"
                   th:classappend="${currentUri == '/login'} ? ' text-orange-400' : ''">
                    Login
                </a>
            </li>

            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/dashboard}"
                   th:classappend="${currentUri == '/dashboard'} ? ' text-orange-400' : ''">
                    Dashboard
                </a>
            </li>

            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}"
                   th:classappend="${currentUri == '/logout'} ? ' text-orange-400' : ''">
                    Logout
                </a>
            </li>

            <li>
                <button id="theme-toggle" class="cursor-pointer text-xl" type="button">
                    <i class="far fa-moon"></i>
                </button>
            </li>
        </ul>

    </nav>
</header>

</body>
</html>
