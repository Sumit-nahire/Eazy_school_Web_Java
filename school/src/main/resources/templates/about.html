<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy School - Best Education for Your Kids</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ FIXED -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .social-icon {
            @apply w-8 h-8 flex items-center justify-center rounded text-white text-sm transition-opacity hover:opacity-80;
        }
    </style>
</head>

<body class="bg-white text-gray-800 transition-colors duration-300">

    <!-- HEADER -->
    <div th:replace="~{header :: header}"></div>
    
    <main>  

        <!-- INNER BANNER -->
        <section class="relative bg-cover bg-center h-[300px] flex items-center"
                th:style="'background-image: url(' + @{/images/img-11.png} + ');'">

            <div class="absolute inset-0 bg-white/80"></div>

            <div class="relative z-10 px-10 md:px-20">
                <h1 class="text-5xl font-bold text-black mb-4">About Us</h1>

                <div class="flex items-center space-x-3 text-lg font-medium">
                    <a th:href="@{/home}" class="text-black hover:text-gray-700">Home</a>
                    <span class="text-gray-500">›</span>
                    <a th:href="@{/about}" class="text-gray-500">About Us</a>
                </div>
            </div>
        </section>

        <!-- TEACHERS -->
        <section class="py-16 bg-white">
            <div class="container mx-auto px-4">
                <h3 class="text-center mb-7">OUR TEAM</h3>
                <h2 class="text-4xl font-bold text-center mb-12">Meet our Teachers</h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
                    
                    <!-- Teacher 1 -->
                    <div class="bg-white rounded-lg shadow-lg overflow-hidden border flex flex-col items-center">
                        <div class="bg-gray-50 w-full flex justify-center pt-4">
                            <img th:src="@{/images/img-8.jpg}" class="h-64 object-contain">
                        </div>
                        <div class="p-6 text-center w-full">
                            <h3 class="text-xl font-bold mb-4">Emma Watson</h3>
                        </div>
                    </div>

                    <!-- Teacher 2 -->
                    <div class="bg-white rounded-lg shadow-lg overflow-hidden border flex flex-col items-center">
                        <div class="bg-gray-50 w-full flex justify-center pt-4">
                            <img th:src="@{/images/img-7.jpg}" class="h-64 object-contain">
                        </div>
                        <div class="p-6 text-center w-full">
                            <h3 class="text-xl font-bold mb-4">Enrique Lal</h3>
                        </div>
                    </div>

                    <!-- Teacher 3 -->
                    <div class="bg-white rounded-lg shadow-lg overflow-hidden border flex flex-col items-center">
                        <div class="bg-gray-50 w-full flex justify-center pt-4">
                            <img th:src="@{/images/img-9.png}" class="h-64 object-contain">
                        </div>
                        <div class="p-6 text-center w-full">
                            <h3 class="text-xl font-bold mb-4">Smith Ker</h3>
                        </div>
                    </div>

                    <!-- Teacher 4 -->
                    <div class="bg-white rounded-lg shadow-lg overflow-hidden border flex flex-col items-center">
                        <div class="bg-gray-50 w-full flex justify-center pt-4">
                            <img th:src="@{/images/img-10.png}" class="h-64 object-contain">
                        </div>
                        <div class="p-6 text-center w-full">
                            <h3 class="text-xl font-bold mb-4">Forkler Lee</h3>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- ENVIRONMENT -->
        <section class="py-20 bg-white">
            <div class="container mx-auto px-6 md:px-12 lg:px-24">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">	
                    
                    <div class="rounded-lg overflow-hidden">
                        <img th:src="@{/images/img-12.png}" class="w-full h-auto object-cover rounded-xl shadow-sm">
                    </div>

                    <div class="space-y-6">
                        <h2 class="text-5xl font-extrabold">Clean & Safe Environment</h2>
                        <p class="text-gray-500">
                            Eazy School maintains a safe environment.
                        </p>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <div th:replace="~{footer :: footer}"></div>

    <!-- ✅ FIXED -->
    <script th:src="@{/js/main.js}"></script>

</body>
</html>
