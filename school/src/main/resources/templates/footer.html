<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>

<footer class="bg-slate-900 text-white pt-20 pb-10 px-10 md:px-20"
        id="contact"
        th:fragment="footer">

    <div class="grid grid-cols-1 md:grid-cols-4 gap-12 mb-20">

        <div>
            <h3 class="text-xl font-bold mb-6">Contact Info</h3>
            <p class="text-gray-400 text-sm">
                Eazy School, 5th Avenue, NY - 62617.<br><br>
                Phone: 9011516837
            </p>
        </div>

        <div>
            <h3 class="text-xl font-bold mb-6">Quick Links</h3>
            <ul class="text-gray-400 space-y-2 text-sm">
                <li><a th:href="@{/about}">About Us</a></li>
                <li><a th:href="@{/courses}">Courses</a></li>
                <li><a th:href="@{/contact}">Contact Us</a></li>
                <li><a th:href="@{/contact}">Career</a></li>
            </ul>
        </div>

        <div>
            <h3 class="text-xl font-bold mb-6">Explore</h3>
            <ul class="text-gray-400 space-y-2 text-sm">
                <li><a th:href="@{/holidays(festival='true' , federal='true')}">Holidays</a></li>
                <li><a th:href="@{/contact}">Privacy Policy</a></li>
                <li><a th:href="@{/contact}">License</a></li>
                <li><a th:href="@{/courses}">Courses</a></li>
            </ul>
        </div>

        <div>
    <h3 class="text-xl font-bold mb-6">Subscribe</h3>

    <div class="flex shadow-md rounded-lg overflow-hidden border border-gray-200">
        
        <input type="email"
               placeholder="Enter your email"
               class="w-full px-4 py-3 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-300">
        
        <button class="bg-white px-5 flex items-center justify-center border-l border-gray-200 hover:bg-gray-100 transition">
            <i class="fas fa-paper-plane text-gray-700"></i>
        </button>

    </div>
</div>
        </div>

    </div>

    <p class="text-center text-gray-500 border-t border-gray-800 pt-8">
        &copy; <span th:text="${#dates.format(#dates.createNow(),'yyyy')}"></span>
        Eazy School. All rights reserved.
    </p>

</footer>

<div class="floating-top shadow-lg"
     onclick="window.scrollTo(0,0)">
    <i class="fas fa-arrow-up"></i>
</div>

</body>
</html>
